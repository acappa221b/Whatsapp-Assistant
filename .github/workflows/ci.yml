name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Install → Lint → Type Check → Unit Tests → Harness → Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate repo hygiene (no runtime data tracked)
        run: pnpm validate:repo-hygiene

      - name: Prepare database env
        run: cp packages/database/.env.example packages/database/.env

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Unit Tests (with coverage gate)
        run: pnpm test:coverage

      - name: Harness
        run: pnpm harness

      - name: Build
        run: pnpm build
        env:
          DOCKER_BUILD: 'false'
